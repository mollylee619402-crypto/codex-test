<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Codex</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg-1: #eef2ff;
        --bg-2: #f8fafc;
        --card: #ffffff;
        --text-main: #0f172a;
        --text-subtle: #475569;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --primary-active: #1e40af;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
        --border: #dbeafe;
        --stats-bg: #f8fbff;
        --stats-border: #bfdbfe;
        --stats-text: #1e3a8a;
        --result-text: #0b9b66;
      }

      :root[data-theme='dark'] {
        --bg-1: #0f172a;
        --bg-2: #020617;
        --card: #111827;
        --text-main: #e2e8f0;
        --text-subtle: #cbd5e1;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --primary-active: #1d4ed8;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --border: #334155;
        --stats-bg: #172554;
        --stats-border: #1d4ed8;
        --stats-text: #bfdbfe;
        --result-text: #34d399;
      }


      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: radial-gradient(circle at top left, #dbeafe 0%, transparent 45%),
          radial-gradient(circle at bottom right, #e9d5ff 0%, transparent 40%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        color: var(--text-main);
      }

      .card {
        width: min(92vw, 560px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 2.8vw, 2.2rem);
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin-top: 10px;
        line-height: 1.65;
        color: var(--text-subtle);
      }

      .stats {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 12px;
        background: var(--stats-bg);
        border: 1px dashed var(--stats-border);
      }

      .stats p {
        margin: 0;
        font-size: 0.95rem;
        color: var(--stats-text);
      }

      .stats strong {
        font-size: 1.3rem;
        color: #1d4ed8;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      }


      #theme-toggle-btn {
        margin-left: auto;
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border);
      }

      #theme-toggle-btn:hover {
        background: rgba(148, 163, 184, 0.12);
      }

      #check-btn {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
      }

      #check-btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      #check-btn:active {
        background: var(--primary-active);
        transform: translateY(1px);
      }

      #reset-btn {
        background: var(--danger);
        color: #fff;
      }

      #reset-btn:hover {
        background: var(--danger-hover);
      }

      #result {
        margin-top: 14px;
        min-height: 24px;
        font-weight: 600;
        color: var(--result-text);
      }

      @media (max-width: 480px) {
        .card {
          padding: 22px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello Codex</h1>
      <p class="subtitle">一个更美观的小页面：支持点击计数、持久化保存，以及一键重置。</p>

      <section class="stats" aria-live="polite">
        <p>当前点击次数</p>
        <strong id="count">0</strong>
      </section>

      <div class="actions">
        <button id="check-btn" type="button">点击 +1</button>
        <button id="reset-btn" type="button">重置计数</button>
        <button id="theme-toggle-btn" type="button" aria-label="切换深色模式" aria-pressed="false">切换到深色模式</button>
      </div>

      <p id="result" aria-live="polite"></p>
    </main>

    <script>
      const button = document.getElementById('check-btn');
      const resetButton = document.getElementById('reset-btn');
      const countText = document.getElementById('count');
      const result = document.getElementById('result');
      const storageKey = 'codex-click-count';

      const themeToggleButton = document.getElementById('theme-toggle-btn');
      const themeStorageKey = 'theme-preference';
      const darkTheme = 'dark';
      const lightTheme = 'light';

      const getPreferredTheme = () => {
        const storedTheme = localStorage.getItem(themeStorageKey);
        if (storedTheme === darkTheme || storedTheme === lightTheme) {
          return storedTheme;
        }

        return window.matchMedia('(prefers-color-scheme: dark)').matches ? darkTheme : lightTheme;
      };

      const applyTheme = (theme) => {
        document.documentElement.dataset.theme = theme;
        const isDark = theme === darkTheme;
        themeToggleButton.textContent = isDark ? '切换到浅色模式' : '切换到深色模式';
        themeToggleButton.setAttribute('aria-label', isDark ? '切换到浅色模式' : '切换到深色模式');
        themeToggleButton.setAttribute('aria-pressed', String(isDark));
      };

      const saveTheme = (theme) => {
        localStorage.setItem(themeStorageKey, theme);
      };


      const getStoredCount = () => {
        const value = Number.parseInt(localStorage.getItem(storageKey) ?? '0', 10);
        return Number.isNaN(value) || value < 0 ? 0 : value;
      };

      let clickCount = getStoredCount();

      const renderCount = () => {
        countText.textContent = String(clickCount);
      };

      const saveCount = () => {
        localStorage.setItem(storageKey, String(clickCount));
      };

      const initialTheme = getPreferredTheme();
      applyTheme(initialTheme);

      renderCount();

      button.addEventListener('click', () => {
        clickCount += 1;
        saveCount();
        renderCount();
        result.textContent = 'Codex is working!';
      });

      themeToggleButton.addEventListener('click', () => {
        const nextTheme = document.documentElement.dataset.theme === darkTheme ? lightTheme : darkTheme;
        applyTheme(nextTheme);
        saveTheme(nextTheme);
      });

      resetButton.addEventListener('click', () => {
        clickCount = 0;
        saveCount();
        renderCount();
        result.textContent = '计数已重置。';
      });
    </script>
  </body>
</html>
