<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Codex</title>
    <style>
      :root {
        color-scheme: light;
        --bg-start: #eef2ff;
        --bg-end: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-subtle: #475569;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --primary-active: #1e40af;
        --border: #dbeafe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
        color: var(--text-main);
      }

      .card {
        width: min(92vw, 520px);
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(37, 99, 235, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 2.5vw, 2.1rem);
      }

      p {
        margin: 0;
        line-height: 1.65;
        color: var(--text-subtle);
      }

      .actions {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      }

      #check-btn {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.28);
      }

      #check-btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      #check-btn:active {
        background: var(--primary-active);
        transform: translateY(1px);
      }

      #reset-btn {
        background: #e2e8f0;
        color: #1e293b;
      }

      #reset-btn:hover {
        background: #cbd5e1;
      }

      #result,
      #count {
        margin-top: 14px;
      }

      #result {
        color: #0b9b66;
        font-weight: 600;
      }

      #count {
        font-weight: 600;
        color: var(--text-main);
      }

      @media (max-width: 480px) {
        .card {
          padding: 22px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello Codex</h1>
      <p>这是一个更美观的网页示例，用来验证 Codex 是否正常工作。</p>

      <div class="actions">
        <button id="check-btn" type="button">点击测试</button>
        <button id="reset-btn" type="button">重置计数</button>
      </div>

      <p id="count" aria-live="polite">已点击：0 次</p>
      <p id="result" aria-live="polite"></p>
    </main>

    <script>
      const button = document.getElementById('check-btn');
      const resetButton = document.getElementById('reset-btn');
      const countText = document.getElementById('count');
      const result = document.getElementById('result');
      const storageKey = 'codex-click-count';

      const savedCount = Number.parseInt(localStorage.getItem(storageKey) ?? '0', 10);
      let clickCount = Number.isNaN(savedCount) ? 0 : savedCount;

      const renderCount = () => {
        countText.textContent = `已点击：${clickCount} 次`;
      };

      renderCount();

      button.addEventListener('click', () => {
        clickCount += 1;
        localStorage.setItem(storageKey, String(clickCount));
        renderCount();
        result.textContent = 'Codex is working!';
      });

      resetButton.addEventListener('click', () => {
        clickCount = 0;
        localStorage.setItem(storageKey, '0');
        renderCount();
        result.textContent = '计数已重置。';
      });
    </script>
  </body>
</html>
