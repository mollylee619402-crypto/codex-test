<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文本/CSV 自动整理工具</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --text-main: #1f2937;
        --text-sub: #4b5563;
        --border: #dbe2ea;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --warn: #b45309;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
        --ok-bg: #eef6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: var(--bg);
        color: var(--text-main);
      }

      .container {
        max-width: 980px;
        margin: 32px auto;
        padding: 0 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(31, 41, 55, 0.06);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.7rem;
      }

      .desc {
        margin: 0 0 18px;
        color: var(--text-sub);
        line-height: 1.65;
      }

      .desc strong {
        color: var(--warn);
      }

      textarea {
        width: 100%;
        min-height: 360px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.55;
        outline: none;
      }

      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text-main);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--primary);
      }

      .btn-main {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      .btn-main:hover {
        background: var(--primary-hover);
        border-color: var(--primary-hover);
      }

      .btn-danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }

      .btn-danger:hover {
        background: var(--danger-hover);
        border-color: var(--danger-hover);
      }

      .stats {
        margin-top: 16px;
        background: var(--ok-bg);
        border: 1px dashed #bfdbfe;
        border-radius: 10px;
        padding: 12px 14px;
        display: grid;
        grid-template-columns: repeat(2, minmax(180px, 1fr));
        gap: 8px 16px;
      }

      .stats-item {
        font-size: 14px;
      }

      .stats-item strong {
        font-size: 16px;
      }

      #notice {
        min-height: 24px;
        margin-top: 12px;
        color: #0f766e;
        font-weight: 600;
      }

      @media (max-width: 640px) {
        .stats {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <main class="card">
        <h1>文本 / CSV 自动整理工具</h1>
        <p class="desc">
          粘贴多行文本或 CSV 内容后，可快速完成清理和整理。<strong>所有处理均在浏览器本地完成，不上传任何数据。</strong>
        </p>

        <textarea id="editor" placeholder="请在此粘贴多行文本或 CSV 内容..."></textarea>

        <div class="actions">
          <button id="trim-btn" type="button">清理前后空格</button>
          <button id="remove-empty-btn" type="button">去除空行</button>
          <button id="remove-dup-btn" type="button">去除重复行</button>
          <button id="sort-btn" type="button">按行排序</button>
          <button id="copy-btn" class="btn-main" type="button">一键复制结果</button>
          <button id="upload-btn" type="button">上传 CSV 文件</button>
          <input id="upload-input" type="file" accept=".csv,text/csv" hidden />
          <button id="download-btn" type="button">下载为 CSV 文件</button>
          <button id="clear-btn" class="btn-danger" type="button">清空内容</button>
        </div>

        <section class="stats" aria-live="polite">
          <div class="stats-item">处理前行数：<strong id="before-count">0</strong></div>
          <div class="stats-item">处理后行数：<strong id="after-count">0</strong></div>
          <div class="stats-item">删除空行：<strong id="empty-removed">0</strong></div>
          <div class="stats-item">删除重复行：<strong id="dup-removed">0</strong></div>
        </section>

        <p id="notice" aria-live="polite"></p>
      </main>
    </div>

    <script>
      const storageKey = 'office-text-csv-content';

      const editor = document.getElementById('editor');
      const beforeCount = document.getElementById('before-count');
      const afterCount = document.getElementById('after-count');
      const emptyRemoved = document.getElementById('empty-removed');
      const dupRemoved = document.getElementById('dup-removed');
      const notice = document.getElementById('notice');

      const getLines = (text) => text.split(/\r?\n/);

      const updateStats = ({ before, after, removedEmpty, removedDup }) => {
        beforeCount.textContent = String(before);
        afterCount.textContent = String(after);
        emptyRemoved.textContent = String(removedEmpty);
        dupRemoved.textContent = String(removedDup);
      };

      const saveInput = () => {
        localStorage.setItem(storageKey, editor.value);
      };

      const processText = (processor, message) => {
        const originalLines = getLines(editor.value);
        const before = editor.value === '' ? 0 : originalLines.length;

        const result = processor(originalLines);
        const nextLines = result.lines;
        editor.value = nextLines.join('\n');
        saveInput();

        const after = editor.value === '' ? 0 : nextLines.length;
        updateStats({
          before,
          after,
          removedEmpty: result.removedEmpty || 0,
          removedDup: result.removedDup || 0,
        });

        notice.textContent = message;
      };

      document.getElementById('trim-btn').addEventListener('click', () => {
        processText(
          (lines) => ({ lines: lines.map((line) => line.trim()), removedEmpty: 0, removedDup: 0 }),
          '已完成：清理每行前后空格。'
        );
      });

      document.getElementById('remove-empty-btn').addEventListener('click', () => {
        processText((lines) => {
          const filtered = lines.filter((line) => line !== '');
          return {
            lines: filtered,
            removedEmpty: lines.length - filtered.length,
            removedDup: 0,
          };
        }, '已完成：去除空行。');
      });

      document.getElementById('remove-dup-btn').addEventListener('click', () => {
        processText((lines) => {
          const unique = [];
          const seen = new Set();
          for (const line of lines) {
            if (!seen.has(line)) {
              seen.add(line);
              unique.push(line);
            }
          }

          return {
            lines: unique,
            removedEmpty: 0,
            removedDup: lines.length - unique.length,
          };
        }, '已完成：去除重复行（保留首次出现顺序）。');
      });

      document.getElementById('sort-btn').addEventListener('click', () => {
        processText(
          (lines) => ({ lines: [...lines].sort((a, b) => a.localeCompare(b, 'zh-CN')), removedEmpty: 0, removedDup: 0 }),
          '已完成：按行排序。'
        );
      });

      document.getElementById('copy-btn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(editor.value);
          notice.textContent = '复制成功，可直接粘贴使用。';
        } catch (error) {
          notice.textContent = '复制失败：当前浏览器环境不支持自动复制，请手动复制。';
        }
      });


      document.getElementById('upload-btn').addEventListener('click', () => {
        document.getElementById('upload-input').click();
      });

      document.getElementById('upload-input').addEventListener('change', (event) => {
        const input = event.target;
        const [file] = input.files || [];

        if (!file) {
          notice.textContent = '未选择文件。';
          return;
        }

        const reader = new FileReader();

        reader.onload = () => {
          editor.value = typeof reader.result === 'string' ? reader.result : '';
          saveInput();

          const lines = editor.value === '' ? 0 : getLines(editor.value).length;
          updateStats({ before: lines, after: lines, removedEmpty: 0, removedDup: 0 });
          notice.textContent = `已加载本地 CSV 文件：${file.name}`;

          input.value = '';
        };

        reader.onerror = () => {
          notice.textContent = '读取文件失败，请重试。';
          input.value = '';
        };

        reader.readAsText(file);
      });

      document.getElementById('download-btn').addEventListener('click', () => {
        const csvContent = editor.value;
        const utf8Bom = '\uFEFF';
        const csvWithBom = `${utf8Bom}${csvContent}`;
        const blob = new Blob([csvWithBom], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);

        const link = document.createElement('a');
        link.href = url;
        link.download = 'cleaned.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        notice.textContent = '已下载：cleaned.csv';
      });

      document.getElementById('clear-btn').addEventListener('click', () => {
        editor.value = '';
        localStorage.removeItem(storageKey);
        updateStats({ before: 0, after: 0, removedEmpty: 0, removedDup: 0 });
        notice.textContent = '内容已清空。';
      });

      editor.addEventListener('input', () => {
        saveInput();
        const lines = editor.value === '' ? 0 : getLines(editor.value).length;
        updateStats({ before: lines, after: lines, removedEmpty: 0, removedDup: 0 });
      });

      const stored = localStorage.getItem(storageKey);
      if (stored) {
        editor.value = stored;
      }

      const initialCount = editor.value === '' ? 0 : getLines(editor.value).length;
      updateStats({ before: initialCount, after: initialCount, removedEmpty: 0, removedDup: 0 });
    </script>
  </body>
</html>
