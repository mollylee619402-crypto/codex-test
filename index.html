<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Codex</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #eef2ff;
        --bg-2: #f8fafc;
        --card: #ffffff;
        --text-main: #0f172a;
        --text-subtle: #475569;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --primary-active: #1e40af;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
        --border: #dbeafe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: radial-gradient(circle at top left, #dbeafe 0%, transparent 45%),
          radial-gradient(circle at bottom right, #e9d5ff 0%, transparent 40%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        color: var(--text-main);
      }

      .card {
        width: min(92vw, 560px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 2.8vw, 2.2rem);
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin-top: 10px;
        line-height: 1.65;
        color: var(--text-subtle);
      }

      .stats {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 12px;
        background: #f8fbff;
        border: 1px dashed #bfdbfe;
      }

      .stats p {
        margin: 0;
        font-size: 0.95rem;
        color: #1e3a8a;
      }

      .stats strong {
        font-size: 1.3rem;
        color: #1d4ed8;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      }

      #check-btn {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
      }

      #check-btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      #check-btn:active {
        background: var(--primary-active);
        transform: translateY(1px);
      }

      #reset-btn {
        background: var(--danger);
        color: #fff;
      }

      #reset-btn:hover {
        background: var(--danger-hover);
      }

      #result {
        margin-top: 14px;
        min-height: 24px;
        font-weight: 600;
        color: #0b9b66;
      }

      @media (max-width: 480px) {
        .card {
          padding: 22px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello Codex</h1>
      <p class="subtitle">一个更美观的小页面：支持点击计数、持久化保存，以及一键重置。</p>

      <section class="stats" aria-live="polite">
        <p>当前点击次数</p>
        <strong id="count">0</strong>
      </section>

      <div class="actions">
        <button id="check-btn" type="button">点击 +1</button>
        <button id="reset-btn" type="button">重置计数</button>
      </div>

      <p id="result" aria-live="polite"></p>
    </main>

    <script>
      const button = document.getElementById('check-btn');
      const resetButton = document.getElementById('reset-btn');
      const countText = document.getElementById('count');
      const result = document.getElementById('result');
      const storageKey = 'codex-click-count';

      const getStoredCount = () => {
        const value = Number.parseInt(localStorage.getItem(storageKey) ?? '0', 10);
        return Number.isNaN(value) || value < 0 ? 0 : value;
      };

      let clickCount = getStoredCount();

      const renderCount = () => {
        countText.textContent = String(clickCount);
      };

      const saveCount = () => {
        localStorage.setItem(storageKey, String(clickCount));
      };

      renderCount();

      button.addEventListener('click', () => {
        clickCount += 1;
        saveCount();
        renderCount();
        result.textContent = 'Codex is working!';
      });

      resetButton.addEventListener('click', () => {
        clickCount = 0;
        saveCount();
        renderCount();
        result.textContent = '计数已重置。';
      });
    </script>
  </body>
</html>
